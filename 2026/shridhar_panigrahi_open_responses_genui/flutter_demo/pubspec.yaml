name: open_responses_demo
description: >
  APIDash — Open Responses & Generative UI
  Standalone demo for GSoC 2026 Idea 5.
  Shows the full dashboard (Output · Assertions · Analytics),
  SSE Stream Debugger, and Paste & Explore panel.
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
