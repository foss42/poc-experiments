name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "18"
  PROJECT_DIR: projects/api-explorer-pipeline

jobs:
  validate-files:
    name: Validate Project Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📁 Checking project structure..."

          # Check directories
          for dir in pipeline backend frontend registry apis; do
            if [ -d "$dir" ]; then
              echo "✅ $dir/ exists"
            else
              echo "❌ $dir/ missing"
              exit 1
            fi
          done

          # Check files
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt exists"
          else
            echo "❌ requirements.txt missing"
            exit 1
          fi

          if [ -f "registry/global_index.json" ]; then
            echo "✅ registry/global_index.json exists"
          else
            echo "❌ registry/global_index.json missing"
            exit 1
          fi

          echo "✅ All required directories and files present"

      - name: Validate OpenAPI files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating OpenAPI files..."

          # Check if apis directory exists
          if [ ! -d "apis" ]; then
            echo "❌ apis/ directory not found"
            exit 1
          fi

          # Count files
          json_count=0
          errors=0

          # Check if any files exist
          file_count=$(find apis -name "openapi.json" | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "⚠️  No OpenAPI files found in apis/"
            exit 1
          fi
          echo "Found $file_count OpenAPI files"

          # Validate JSON files
          for file in $(find apis -name "openapi.json"); do
            if [ -f "$file" ]; then
              if python -m json.tool "$file" > /dev/null 2>&1; then
                echo "✅ $(basename $(dirname $file))/openapi.json"
                json_count=$((json_count + 1))
              else
                echo "❌ $(basename $file) - Invalid JSON"
                errors=$((errors + 1))
              fi
            fi
          done

          echo ""
          echo "📊 Validation Summary:"
          echo "  OpenAPI files: $json_count"
          echo "  Errors: $errors"

          if [ $errors -gt 0 ]; then
            echo "❌ Validation failed with $errors errors"
            exit 1
          fi

          if [ $json_count -eq 0 ]; then
            echo "❌ No valid OpenAPI files found"
            exit 1
          fi

          echo "✅ All OpenAPI files are valid"

  test-backend:
    name: Test Backend Server
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ${{ env.PROJECT_DIR }}/backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --prefer-offline
          echo "✅ Dependencies installed"

      - name: Start backend server
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend server..."
          node simple-server.js > server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > server.pid
          echo "Server PID: $SERVER_PID"

          # Wait for server with retries
          echo "⏳ Waiting for server..."
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready after $i seconds"
              exit 0
            fi
            
            # Check if process died
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died"
              cat server.log
              exit 1
            fi
            
            sleep 1
          done

          echo "❌ Server timeout after 30 seconds"
          cat server.log
          exit 1

      - name: Test endpoints
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Testing endpoints..."

          # Test 1: Root endpoint
          echo "Test 1: Root endpoint"
          root_response=$(curl -s http://localhost:3002/)

          if echo "$root_response" | grep -q '"message"'; then
            echo "✅ Root endpoint OK"
          else
            echo "❌ Root endpoint failed"
            exit 1
          fi

          # Test 2: APIs endpoint
          echo "Test 2: APIs endpoint"
          response=$(curl -s http://localhost:3002/apis)

          if echo "$response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ APIs endpoint OK"
          else
            echo "❌ APIs endpoint failed"
            exit 1
          fi

          # Test 3: AI search endpoint
          echo "Test 3: AI search endpoint"
          search_response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
            -H "Content-Type: application/json" \
            -d '{"query":"get users"}')

          if echo "$search_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ AI search endpoint OK"
          else
            echo "❌ AI search endpoint failed"
            exit 1
          fi

          echo "✅ All endpoint tests passed"

      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: ${{ env.PROJECT_DIR }}/backend/server.log
          retention-days: 7

  test-frontend:
    name: Test Frontend Files
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating frontend files..."

          # Check if frontend directory exists
          if [ ! -d "frontend" ]; then
            echo "❌ frontend/ directory not found"
            exit 1
          fi

          # Check HTML
          if [ -f "frontend/index.html" ]; then
            echo "✅ HTML file found"
          else
            echo "❌ frontend/index.html not found"
            exit 1
          fi

          # Check JavaScript
          if [ -f "frontend/script.js" ]; then
            if node -c frontend/script.js 2>&1; then
              echo "✅ JavaScript syntax valid"
            else
              echo "❌ JavaScript syntax error"
              exit 1
            fi
          else
            echo "❌ frontend/script.js not found"
            exit 1
          fi

          # Check CSS
          if [ -f "frontend/style.css" ]; then
            file_size=$(wc -c < frontend/style.css)
            if [ $file_size -gt 100 ]; then
              echo "✅ CSS valid ($file_size bytes)"
            else
              echo "⚠️  CSS file too small ($file_size bytes)"
            fi
          else
            echo "❌ frontend/style.css not found"
            exit 1
          fi

          echo "✅ All frontend files validated"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "📦 Installing dependencies..."
          npm ci

      - name: Start backend
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend..."
          node simple-server.js > integration.log 2>&1 &
          echo $! > integration.pid

          # Wait for server
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi
            sleep 1
          done

          echo "❌ Server timeout"
          cat integration.log
          exit 1

      - name: Run integration tests
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Running integration tests..."

          # Test API listing
          echo "Test 1: API listing"
          apis_response=$(curl -s http://localhost:3002/apis)

          if echo "$apis_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ API listing works"
          else
            echo "❌ API listing failed"
            exit 1
          fi

          # Test AI search with multiple queries
          queries=("get users" "create pet" "weather forecast")

          for query in "${queries[@]}"; do
            echo "Testing: $query"
            response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$query\"}")
            
            if echo "$response" | grep -q '"success"'; then
              echo "✅ Query '$query' OK"
            else
              echo "⚠️  Query '$query' returned response"
            fi
          done

          echo "✅ All integration tests passed"

      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f integration.pid ]; then
            kill $(cat integration.pid) 2>/dev/null || true
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: ${{ env.PROJECT_DIR }}/backend/integration.log
          retention-days: 7
