name: API Explorer CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install Python dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run batch processing pipeline
      - name: Run API batch processor
        run: |
          python pipeline/batch_processor.py data/

      # 5. Generate templates
      - name: Generate API templates
        run: |
          python pipeline/template_generator.py

      # 6. Verify registry output
      - name: Verify registry files
        run: |
          echo "Checking registry contents..."
          ls -R registry/

      # 7. (Optional but impressive) Node check
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Check backend starts
        run: |
          cd backend
          node simple-server.js &
          sleep 10
          curl -f http://localhost:3002/health || echo "Health check skipped"

      # 8. Run basic frontend check
      - name: Check frontend files
        run: |
          echo "Checking frontend..."
          ls -la frontend/ || echo "⚠️ frontend folder not found"

            # 9. Validate JSON registry safely
      - name: Validate JSON
        run: |
          echo "Validating registry JSON..."
          python -c "import json; json.load(open('registry/global_index.json')); print('✅ JSON is valid')"

      # 10. Validate API count (SAFE Python way)
      - name: Validate API count
        run: |
          python -c "import json, sys; data=json.load(open('registry/global_index.json')); count=len(data.get('apis', [])); print(f'APIs found: {count}'); sys.exit(1) if count < 1 else None"

      # 11. Health check (STRICT)
      - name: Backend health check
        run: |
          sleep 5
          curl -f http://localhost:3002/health

      # 12. Success message
      - name: Success message
        run: echo "✅ CI Pipeline completed successfully!"
