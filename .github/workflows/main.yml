name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  PROJECT_DIR: projects/api-explorer-pipeline

jobs:
  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "✅ Checking project structure..."

          for dir in backend frontend registry apis; do
            [ -d "$dir" ] && echo "✅ $dir/" || (echo "❌ $dir/ missing" && exit 1)
          done

          [ -f "requirements.txt" ] && echo "✅ requirements.txt" || (echo "❌ requirements.txt missing" && exit 1)
          [ -f "registry/global_index.json" ] && echo "✅ registry/global_index.json" || (echo "❌ registry/global_index.json missing" && exit 1)

      - name: Validate OpenAPI files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "✅ Validating OpenAPI files..."

          count=$(find apis -name "openapi.json" -type f | wc -l)
          echo "Found $count OpenAPI files"

          find apis -name "openapi.json" -type f | while read file; do
            python3 -c "import json; json.load(open('$file'))" 2>/dev/null && echo "✅ $(dirname $file | xargs basename)" || (echo "❌ $file invalid" && exit 1)
          done

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate frontend files
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        run: |
          echo "✅ Checking frontend files..."

          [ -f "index.html" ] && echo "✅ index.html" || (echo "❌ index.html missing" && exit 1)
          [ -f "script.js" ] && echo "✅ script.js" || (echo "❌ script.js missing" && exit 1)
          [ -f "style.css" ] && echo "✅ style.css" || (echo "❌ style.css missing" && exit 1)

          node -c script.js && echo "✅ JavaScript syntax valid" || (echo "❌ JavaScript syntax error" && exit 1)

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: npm install --prefer-offline --no-audit

      - name: Check syntax
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: node -c simple-server.js && echo "✅ Backend syntax valid"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate, test-frontend, test-backend]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build summary
        run: |
          echo "✅ CI/CD Pipeline Complete"
          echo ""
          echo "📊 Summary:"
          echo "  ✅ Files validated"
          echo "  ✅ Frontend checked"
          echo "  ✅ Backend checked"
          echo ""
          echo "🚀 Ready for deployment"
