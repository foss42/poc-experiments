name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-files:
    name: Validate Project Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install Python dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          pip install --upgrade pip
          pip install pyyaml
      
      - name: Validate OpenAPI JSON files
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Validating JSON files..."
          json_count=0
          for file in data/*.json; do
            if [ -f "$file" ]; then
              if python -m json.tool "$file" > /dev/null 2>&1; then
                echo "✅ $(basename $file)"
                json_count=$((json_count + 1))
              else
                echo "❌ $(basename $file) - Invalid JSON"
                exit 1
              fi
            fi
          done
          echo "✅ Validated $json_count JSON files"
      
      - name: Validate OpenAPI YAML files
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Validating YAML files..."
          yaml_count=0
          for file in data/*.yaml data/*.yml; do
            if [ -f "$file" ]; then
              if python -c "import yaml; yaml.safe_load(open('$file', 'r', encoding='utf-8'))" 2>&1; then
                echo "✅ $(basename $file)"
                yaml_count=$((yaml_count + 1))
              else
                echo "❌ $(basename $file) - Invalid YAML"
                exit 1
              fi
            fi
          done
          echo "✅ Validated $yaml_count YAML files"
      
      - name: Check project structure
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "📁 Checking project structure..."
          [ -d "data" ] && echo "✅ data/ exists" || (echo "❌ data/ missing" && exit 1)
          [ -d "pipeline" ] && echo "✅ pipeline/ exists" || (echo "❌ pipeline/ missing" && exit 1)
          [ -d "backend" ] && echo "✅ backend/ exists" || (echo "❌ backend/ missing" && exit 1)
          [ -d "frontend" ] && echo "✅ frontend/ exists" || (echo "❌ frontend/ missing" && exit 1)
          [ -f "requirements.txt" ] && echo "✅ requirements.txt exists" || (echo "❌ requirements.txt missing" && exit 1)
          echo "✅ All required directories and files present"

  test-pipeline:
    name: Test Python Pipeline
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run batch processor
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🚀 Running batch processor..."
          python pipeline/batch_processor.py data --clear 2>&1 | tee pipeline_output.log
          
          # Check if pipeline succeeded
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Pipeline completed successfully"
          else
            echo "❌ Pipeline failed"
            cat pipeline_output.log
            exit 1
          fi
      
      - name: Verify registry was created
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Verifying registry structure..."
          
          # Check global index
          if [ -f "registry/global_index.json" ]; then
            echo "✅ Global index exists"
            python -m json.tool registry/global_index.json > /dev/null
            
            # Count APIs
            api_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalAPIs'])")
            endpoint_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalEndpoints'])")
            echo "📊 Registry contains $api_count APIs with $endpoint_count endpoints"
          else
            echo "❌ Registry not found"
            ls -la registry/ || echo "Registry directory doesn't exist"
            exit 1
          fi
          
          # Check if APIs folder was created
          if [ -d "apis" ]; then
            api_folders=$(find apis -type d -mindepth 1 -maxdepth 1 | wc -l)
            echo "✅ APIs folder contains $api_folders API directories"
          else
            echo "⚠️  APIs folder not found"
          fi
      
      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            projects/api-explorer-pipeline/registry/
            projects/api-explorer-pipeline/apis/
            projects/api-explorer-pipeline/pipeline_output.log
          retention-days: 7

  test-backend:
    name: Test Backend Server
    runs-on: ubuntu-latest
    needs: test-pipeline
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: projects/api-explorer-pipeline/backend/package-lock.json
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install Python dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate test data
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔧 Generating test data..."
          python pipeline/batch_processor.py data --clear
          
          # Verify data was generated
          if [ -f "registry/global_index.json" ]; then
            echo "✅ Test data generated"
          else
            echo "❌ Failed to generate test data"
            exit 1
          fi
      
      - name: Install backend dependencies
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci
      
      - name: Start backend server
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "🚀 Starting backend server..."
          node simple-server.js > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo $SERVER_PID > server.pid
          
          # Wait for server to start with retries
          echo "⏳ Waiting for server to be ready..."
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -s http://localhost:3002/ > /dev/null 2>&1; then
              echo "✅ Server is ready after $attempt seconds"
              break
            fi
            
            # Check if process is still running
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died"
              cat server.log
              exit 1
            fi
            
            attempt=$((attempt + 1))
            sleep 1
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Server failed to start within 30 seconds"
            cat server.log
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
      
      - name: Test backend health
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "🏥 Testing backend health..."
          
          # Test root endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/)
          if [ "$response" = "200" ]; then
            echo "✅ Backend root endpoint is healthy (HTTP $response)"
          else
            echo "❌ Backend health check failed (HTTP $response)"
            cat server.log
            exit 1
          fi
      
      - name: Test API endpoints
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "🔍 Testing API endpoints..."
          
          # Test /apis endpoint
          echo "Testing /apis endpoint..."
          apis_response=$(curl -s http://localhost:3002/apis)
          if echo "$apis_response" | grep -q "success"; then
            echo "✅ /apis endpoint working"
          else
            echo "❌ /apis endpoint failed"
            echo "Response: $apis_response"
            exit 1
          fi
          
          # Test /categories endpoint
          echo "Testing /categories endpoint..."
          if curl -f -s http://localhost:3002/categories > /dev/null; then
            echo "✅ /categories endpoint working"
          else
            echo "❌ /categories endpoint failed"
            exit 1
          fi
          
          # Test AI search endpoint
          echo "Testing AI search endpoint..."
          search_response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
            -H "Content-Type: application/json" \
            -d '{"query":"get users"}')
          
          # Check for both "success": true AND "results" field
          if echo "$search_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true' && \
             echo "$search_response" | grep -q '"results"'; then
            echo "✅ AI search endpoint working"
            echo "Sample response: $(echo "$search_response" | head -c 200)..."
          else
            echo "❌ AI search endpoint failed"
            echo "Full response: $search_response"
            
            # Debug: Check what fields are present
            echo "Debug - Checking response structure:"
            echo "$search_response" | grep -o '"[^"]*"[[:space:]]*:' | head -10
            exit 1
          fi
          
          echo "✅ All API endpoints tested successfully"
      
      - name: Stop backend server
        if: always()
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          if [ -f server.pid ]; then
            SERVER_PID=$(cat server.pid)
            echo "Stopping server (PID: $SERVER_PID)..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 2
          fi
      
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-logs
          path: projects/api-explorer-pipeline/backend/server.log
          retention-days: 7

  test-frontend:
    name: Test Frontend Files
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Validate HTML
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Validating HTML structure..."
          if [ ! -f "frontend/index.html" ]; then
            echo "❌ frontend/index.html not found"
            exit 1
          fi
          
          if grep -q "API Explorer" frontend/index.html; then
            echo "✅ HTML contains expected content"
          else
            echo "❌ HTML validation failed - missing 'API Explorer' text"
            exit 1
          fi
          
          # Check for required elements
          if grep -q "id=\"searchInput\"" frontend/index.html; then
            echo "✅ Search input element found"
          else
            echo "⚠️  Search input element not found"
          fi
      
      - name: Check JavaScript syntax
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Checking JavaScript syntax..."
          if [ ! -f "frontend/script.js" ]; then
            echo "❌ frontend/script.js not found"
            exit 1
          fi
          
          node -c frontend/script.js
          echo "✅ JavaScript syntax is valid"
          
          # Check for key functions
          if grep -q "loadAPIs" frontend/script.js; then
            echo "✅ loadAPIs function found"
          fi
          
          if grep -q "searchAPIs" frontend/script.js; then
            echo "✅ searchAPIs function found"
          fi
      
      - name: Validate CSS
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Validating CSS..."
          if [ ! -f "frontend/style.css" ]; then
            echo "❌ frontend/style.css not found"
            exit 1
          fi
          
          # Check file size (should not be empty)
          file_size=$(wc -c < frontend/style.css)
          if [ $file_size -gt 100 ]; then
            echo "✅ CSS file exists and has content ($file_size bytes)"
          else
            echo "❌ CSS file is too small or empty"
            exit 1
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: projects/api-explorer-pipeline/backend/package-lock.json
      
      - name: Install all dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "📦 Installing Python dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt
          
          echo "📦 Installing Node.js dependencies..."
          cd backend && npm ci
      
      - name: Process APIs
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🚀 Processing APIs..."
          python pipeline/batch_processor.py data --clear
          
          # Verify processing succeeded
          if [ -f "registry/global_index.json" ]; then
            api_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalAPIs'])")
            echo "✅ Processed $api_count APIs"
          else
            echo "❌ API processing failed"
            exit 1
          fi
      
      - name: Start backend
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "🚀 Starting backend server..."
          node simple-server.js > integration_server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > integration_server.pid
          
          # Wait for server with timeout
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -s http://localhost:3002/ > /dev/null 2>&1; then
              echo "✅ Server ready after $attempt seconds"
              break
            fi
            
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died"
              cat integration_server.log
              exit 1
            fi
            
            attempt=$((attempt + 1))
            sleep 1
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Server timeout"
            cat integration_server.log
            exit 1
          fi
      
      - name: Test API endpoints
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          echo "🔍 Testing complete API discovery workflow..."
          
          # Test 1: API listing with categories
          echo "Test 1: API listing..."
          response=$(curl -s http://localhost:3002/apis)
          if echo "$response" | grep -q "success"; then
            echo "✅ API listing working"
          else
            echo "❌ API listing failed"
            echo "Response: $response"
            exit 1
          fi
          
          # Test 2: Categories endpoint
          echo "Test 2: Categories..."
          if curl -f -s http://localhost:3002/categories > /dev/null; then
            echo "✅ Categories endpoint working"
          else
            echo "❌ Categories endpoint failed"
            exit 1
          fi
          
          # Test 3: AI search with different queries
          echo "Test 3: AI search queries..."
          queries=("get users" "create pet" "weather forecast")
          
          for query in "${queries[@]}"; do
            echo "  Testing query: '$query'"
            search_response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$query\"}")
            
            # Check for both "success": true AND "results" field
            if echo "$search_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true' && \
               echo "$search_response" | grep -q '"results"'; then
              echo "  ✅ Query '$query' processed"
            else
              echo "  ❌ Query '$query' failed"
              echo "  Full response: $search_response"
              
              # Debug: Show response structure
              echo "  Debug - Response fields:"
              echo "$search_response" | grep -o '"[^"]*"[[:space:]]*:' | head -10
              exit 1
            fi
          done
          
          echo "🎉 All integration tests passed!"
      
      - name: Stop backend server
        if: always()
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          if [ -f integration_server.pid ]; then
            SERVER_PID=$(cat integration_server.pid)
            echo "Stopping server (PID: $SERVER_PID)..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 2
          fi
      
      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: projects/api-explorer-pipeline/backend/integration_server.log
          retention-days: 7

  deploy-demo:
    name: Deploy Demo Artifacts
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install Python dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate demo data
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🚀 Generating demo data..."
          python pipeline/batch_processor.py data --clear
          
          # Verify generation succeeded
          if [ -f "registry/global_index.json" ]; then
            api_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalAPIs'])")
            endpoint_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalEndpoints'])")
            echo "✅ Generated demo data: $api_count APIs, $endpoint_count endpoints"
          else
            echo "❌ Demo data generation failed"
            exit 1
          fi
      
      - name: Prepare demo artifacts
        run: |
          echo "📦 Preparing demo artifacts..."
          mkdir -p demo-artifacts
          
          # Copy all necessary files
          cp -r projects/api-explorer-pipeline/registry demo-artifacts/
          cp -r projects/api-explorer-pipeline/apis demo-artifacts/
          cp -r projects/api-explorer-pipeline/api_templates demo-artifacts/
          cp -r projects/api-explorer-pipeline/frontend demo-artifacts/
          cp -r projects/api-explorer-pipeline/backend demo-artifacts/
          cp -r projects/api-explorer-pipeline/data demo-artifacts/
          cp projects/api-explorer-pipeline/README.md demo-artifacts/
          cp projects/api-explorer-pipeline/*.ps1 demo-artifacts/ 2>/dev/null || true
          
          # Create a manifest file
          cat > demo-artifacts/MANIFEST.txt << EOF
          API Explorer Demo Artifacts
          Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          
          Contents:
          - registry/       : Processed API registry
          - apis/           : Individual API metadata
          - api_templates/  : Generated curl & PowerShell templates
          - frontend/       : Web UI (HTML/CSS/JS)
          - backend/        : Node.js API server
          - data/           : OpenAPI specifications
          - README.md       : Documentation
          - *.ps1           : PowerShell startup scripts
          EOF
          
          echo "✅ Demo artifacts prepared"
          ls -la demo-artifacts/
      
      - name: Archive demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-explorer-demo
          path: demo-artifacts/
          retention-days: 30
          compression-level: 6
      
      - name: Generate artifact summary
        run: |
          echo "## 📦 Demo Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Information:**" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Contents:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Registry (processed API data)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ APIs (individual API metadata)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Templates (curl & PowerShell)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend (HTML/CSS/JS)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend (Node.js server)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Data (OpenAPI specifications)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Documentation (README.md)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Check the Actions artifacts section above." >> $GITHUB_STEP_SUMMARY

