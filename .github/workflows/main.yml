name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "18"
  PROJECT_DIR: projects/api-explorer-pipeline

jobs:
  validate-files:
    name: Validate Project Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📁 Checking project structure..."

          # Check directories
          for dir in pipeline backend frontend registry apis; do
            if [ -d "$dir" ]; then
              echo "✅ $dir/ exists"
            else
              echo "❌ $dir/ missing"
              exit 1
            fi
          done

          # Check files
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt exists"
          else
            echo "❌ requirements.txt missing"
            exit 1
          fi

          if [ -f "registry/global_index.json" ]; then
            echo "✅ registry/global_index.json exists"
          else
            echo "❌ registry/global_index.json missing"
            exit 1
          fi

          echo "✅ All required directories and files present"

      - name: Validate OpenAPI files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating OpenAPI files..."

          # Check if apis directory exists
          if [ ! -d "apis" ]; then
            echo "❌ apis/ directory not found"
            exit 1
          fi

          echo "✅ apis/ directory found"

          # Validate all openapi.json files using find + while loop
          file_count=0
          error_count=0

          find apis -type f -name "openapi.json" 2>/dev/null | sort | while read -r file; do
            if python3 -c "import json; json.load(open('$file'))" 2>/dev/null; then
              api_name=$(basename $(dirname "$file"))
              echo "✅ $api_name/openapi.json"
              echo "1" >> /tmp/validation_count.txt
            else
              echo "❌ $file - Invalid JSON"
              echo "0" >> /tmp/validation_count.txt
            fi
          done

          # Count results
          file_count=$(grep -c "1" /tmp/validation_count.txt 2>/dev/null || echo "0")
          error_count=$(grep -c "0" /tmp/validation_count.txt 2>/dev/null || echo "0")
          rm -f /tmp/validation_count.txt

          echo ""
          echo "📊 Validation Summary:"
          echo "  Total OpenAPI files: $file_count"
          echo "  Invalid files: $error_count"
          echo ""

          if [ "$file_count" -eq 0 ]; then
            echo "❌ No openapi.json files found"
            exit 1
          fi

          if [ "$error_count" -gt 0 ]; then
            echo "❌ $error_count file(s) failed validation"
            exit 1
          fi

          echo "✅ All $file_count OpenAPI files validated successfully"

  test-backend:
    name: Test Backend Server
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ${{ env.PROJECT_DIR }}/backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --prefer-offline
          echo "✅ Dependencies installed"

      - name: Start backend server
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend server..."
          node simple-server.js > server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > server.pid
          echo "Server PID: $SERVER_PID"

          # Wait for server with retries
          echo "⏳ Waiting for server..."
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready after $i seconds"
              exit 0
            fi
            
            # Check if process died
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died"
              cat server.log
              exit 1
            fi
            
            sleep 1
          done

          echo "❌ Server timeout after 30 seconds"
          cat server.log
          exit 1

      - name: Test endpoints
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Testing endpoints..."

          # Test 1: Root endpoint
          echo "Test 1: Root endpoint"
          root_response=$(curl -s http://localhost:3002/)

          if echo "$root_response" | grep -q '"message"'; then
            echo "✅ Root endpoint OK"
          else
            echo "❌ Root endpoint failed"
            exit 1
          fi

          # Test 2: APIs endpoint
          echo "Test 2: APIs endpoint"
          response=$(curl -s http://localhost:3002/apis)

          if echo "$response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ APIs endpoint OK"
          else
            echo "❌ APIs endpoint failed"
            exit 1
          fi

          # Test 3: AI search endpoint
          echo "Test 3: AI search endpoint"
          search_response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
            -H "Content-Type: application/json" \
            -d '{"query":"get users"}')

          if echo "$search_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ AI search endpoint OK"
          else
            echo "❌ AI search endpoint failed"
            exit 1
          fi

          echo "✅ All endpoint tests passed"

      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: ${{ env.PROJECT_DIR }}/backend/server.log
          retention-days: 7

  test-frontend:
    name: Test Frontend Files
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating frontend files..."
          echo ""

          # Define frontend path (relative to PROJECT_DIR)
          FRONTEND_DIR="frontend"

          echo "📁 Checking directory structure..."
          echo "Current directory: $(pwd)"
          echo "Looking for frontend in: $FRONTEND_DIR"
          echo ""

          # Check if frontend directory exists
          if [ ! -d "$FRONTEND_DIR" ]; then
            echo "❌ ERROR: $FRONTEND_DIR/ directory not found"
            echo ""
            echo "📋 Debugging - Current directory contents:"
            ls -la
            echo ""
            echo "📋 Debugging - Project structure:"
            find . -maxdepth 2 -type d | head -20
            exit 1
          fi

          echo "✅ Frontend directory found"
          echo ""

          # Check HTML file
          echo "🔍 Checking HTML file..."
          if [ ! -f "$FRONTEND_DIR/index.html" ]; then
            echo "❌ ERROR: $FRONTEND_DIR/index.html not found"
            echo ""
            echo "📋 Debugging - Frontend directory contents:"
            ls -la "$FRONTEND_DIR/"
            exit 1
          fi

          # Validate HTML content
          if grep -q "API Explorer" "$FRONTEND_DIR/index.html"; then
            echo "✅ HTML file found and contains expected content"
          else
            echo "⚠️  HTML file found but may be incomplete"
            echo "✅ HTML file exists"
          fi
          echo ""

          # Check JavaScript file
          echo "🔍 Checking JavaScript file..."
          if [ ! -f "$FRONTEND_DIR/script.js" ]; then
            echo "❌ ERROR: $FRONTEND_DIR/script.js not found"
            echo ""
            echo "📋 Debugging - Frontend directory contents:"
            ls -la "$FRONTEND_DIR/"
            exit 1
          fi

          # Validate JavaScript syntax
          if node -c "$FRONTEND_DIR/script.js" 2>&1; then
            echo "✅ JavaScript syntax valid"
          else
            echo "❌ JavaScript syntax error"
            exit 1
          fi
          echo ""

          # Check CSS file
          echo "🔍 Checking CSS file..."
          if [ ! -f "$FRONTEND_DIR/style.css" ]; then
            echo "❌ ERROR: $FRONTEND_DIR/style.css not found"
            echo ""
            echo "📋 Debugging - Frontend directory contents:"
            ls -la "$FRONTEND_DIR/"
            exit 1
          fi

          # Validate CSS file size
          file_size=$(wc -c < "$FRONTEND_DIR/style.css")
          if [ "$file_size" -gt 100 ]; then
            echo "✅ CSS valid ($file_size bytes)"
          else
            echo "⚠️  CSS file exists but is small ($file_size bytes)"
            echo "✅ CSS file found"
          fi
          echo ""

          echo "📊 Frontend Validation Summary:"
          echo "  ✅ HTML: $FRONTEND_DIR/index.html"
          echo "  ✅ JavaScript: $FRONTEND_DIR/script.js"
          echo "  ✅ CSS: $FRONTEND_DIR/style.css"
          echo ""
          echo "✅ All frontend files validated successfully"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "📦 Installing dependencies..."
          npm ci

      - name: Start backend
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend..."
          node simple-server.js > integration.log 2>&1 &
          echo $! > integration.pid

          # Wait for server
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi
            sleep 1
          done

          echo "❌ Server timeout"
          cat integration.log
          exit 1

      - name: Run integration tests
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Running integration tests..."

          # Test API listing
          echo "Test 1: API listing"
          apis_response=$(curl -s http://localhost:3002/apis)

          if echo "$apis_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ API listing works"
          else
            echo "❌ API listing failed"
            exit 1
          fi

          # Test AI search with multiple queries
          queries=("get users" "create pet" "weather forecast")

          for query in "${queries[@]}"; do
            echo "Testing: $query"
            response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$query\"}")
            
            if echo "$response" | grep -q '"success"'; then
              echo "✅ Query '$query' OK"
            else
              echo "⚠️  Query '$query' returned response"
            fi
          done

          echo "✅ All integration tests passed"

      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f integration.pid ]; then
            kill $(cat integration.pid) 2>/dev/null || true
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: ${{ env.PROJECT_DIR }}/backend/integration.log
          retention-days: 7
