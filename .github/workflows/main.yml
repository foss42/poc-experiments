name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "18"
  PROJECT_DIR: projects/api-explorer-pipeline

jobs:
  validate-files:
    name: Validate Project Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Check project structure
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📁 Checking project structure..."
          
          # Check directories
          for dir in data pipeline backend frontend; do
            if [ -d "$dir" ]; then
              echo "✅ $dir/ exists"
            else
              echo "❌ $dir/ missing"
              exit 1
            fi
          done
          
          # Check files
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt exists"
          else
            echo "❌ requirements.txt missing"
            exit 1
          fi
          
          echo "✅ All required directories and files present"
      
      - name: Validate OpenAPI files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating OpenAPI files..."
          
          # Count files
          json_count=0
          yaml_count=0
          errors=0
          
          # Validate JSON files
          for file in data/*.json; do
            if [ -f "$file" ]; then
              if python -m json.tool "$file" > /dev/null 2>&1; then
                echo "✅ $(basename $file)"
                json_count=$((json_count + 1))
              else
                echo "❌ $(basename $file) - Invalid JSON"
                errors=$((errors + 1))
              fi
            fi
          done
          
          # Validate YAML files
          for file in data/*.yaml data/*.yml; do
            if [ -f "$file" ]; then
              if python -c "import yaml; yaml.safe_load(open('$file', 'r', encoding='utf-8'))" 2>&1; then
                echo "✅ $(basename $file)"
                yaml_count=$((yaml_count + 1))
              else
                echo "❌ $(basename $file) - Invalid YAML"
                errors=$((errors + 1))
              fi
            fi
          done
          
          echo ""
          echo "📊 Validation Summary:"
          echo "  JSON files: $json_count"
          echo "  YAML files: $yaml_count"
          echo "  Errors: $errors"
          
          if [ $errors -gt 0 ]; then
            echo "❌ Validation failed with $errors errors"
            exit 1
          fi
          
          echo "✅ All OpenAPI files are valid"

  test-pipeline:
    name: Test Python Pipeline
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"
      
      - name: Run batch processor
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🚀 Running batch processor..."
          python pipeline/batch_processor.py data --clear
          echo "✅ Pipeline completed"
      
      - name: Verify registry
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Verifying registry..."
          
          # Check global index exists
          if [ ! -f "registry/global_index.json" ]; then
            echo "❌ registry/global_index.json not found"
            ls -la registry/ || echo "Registry directory doesn't exist"
            exit 1
          fi
          
          # Validate JSON
          python -m json.tool registry/global_index.json > /dev/null
          echo "✅ Registry JSON is valid"
          
          # Get statistics
          api_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalAPIs'])")
          endpoint_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalEndpoints'])")
          
          echo "📊 Registry Statistics:"
          echo "  APIs: $api_count"
          echo "  Endpoints: $endpoint_count"
          
          # Check APIs folder
          if [ -d "apis" ]; then
            api_folders=$(find apis -type d -mindepth 1 -maxdepth 1 | wc -l)
            echo "  API folders: $api_folders"
          fi
          
          echo "✅ Registry verification complete"
      
      - name: Upload registry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-registry
          path: |
            ${{ env.PROJECT_DIR }}/registry/
            ${{ env.PROJECT_DIR }}/apis/
          retention-days: 7

  test-backend:
    name: Test Backend Server
    runs-on: ubuntu-latest
    needs: test-pipeline
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ${{ env.PROJECT_DIR }}/backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install Python dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate test data
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔧 Generating test data..."
          python pipeline/batch_processor.py data --clear
          
          if [ -f "registry/global_index.json" ]; then
            echo "✅ Test data generated"
          else
            echo "❌ Failed to generate test data"
            exit 1
          fi
      
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --prefer-offline
          echo "✅ Dependencies installed"
      
      - name: Start backend server
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend server..."
          node simple-server.js > server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > server.pid
          echo "Server PID: $SERVER_PID"
          
          # Wait for server with retries
          echo "⏳ Waiting for server..."
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready after $i seconds"
              exit 0
            fi
            
            # Check if process died
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died"
              cat server.log
              exit 1
            fi
            
            sleep 1
          done
          
          echo "❌ Server timeout after 30 seconds"
          cat server.log
          exit 1
      
      - name: Test endpoints
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Testing endpoints..."
          
          # Test 1: Root endpoint
          echo "Test 1: Root endpoint"
          root_response=$(curl -s http://localhost:3002/)
          echo "Response received:"
          echo "$root_response"
          
          if echo "$root_response" | grep -q '"message"'; then
            echo "✅ Root endpoint OK"
          else
            echo "❌ Root endpoint failed"
            exit 1
          fi
          
          # Test 2: APIs endpoint
          echo "Test 2: APIs endpoint"
          response=$(curl -s http://localhost:3002/apis)
          echo "Response received:"
          echo "$response"
          
          if echo "$response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ APIs endpoint OK"
          else
            echo "❌ APIs endpoint failed"
            echo "Response: $response"
            exit 1
          fi
          
          # Test 3: AI search endpoint
          echo "Test 3: AI search endpoint"
          search_response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
            -H "Content-Type: application/json" \
            -d '{"query":"get users"}')
          
          echo "Response received:"
          echo "$search_response"
          
          if echo "$search_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ AI search endpoint OK"
          else
            echo "❌ AI search endpoint failed"
            echo "Response: $search_response"
            exit 1
          fi
          
          echo "✅ All endpoint tests passed"
      
      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: ${{ env.PROJECT_DIR }}/backend/server.log
          retention-days: 7

  test-frontend:
    name: Test Frontend Files
    runs-on: ubuntu-latest
    needs: validate-files
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Validate files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Validating frontend files..."
          
          # Check HTML
          if [ -f "frontend/index.html" ] && grep -q "API Explorer" frontend/index.html; then
            echo "✅ HTML valid"
          else
            echo "❌ HTML validation failed"
            exit 1
          fi
          
          # Check JavaScript
          if [ -f "frontend/script.js" ]; then
            node -c frontend/script.js
            echo "✅ JavaScript syntax valid"
          else
            echo "❌ script.js not found"
            exit 1
          fi
          
          # Check CSS
          if [ -f "frontend/style.css" ]; then
            file_size=$(wc -c < frontend/style.css)
            if [ $file_size -gt 100 ]; then
              echo "✅ CSS valid ($file_size bytes)"
            else
              echo "❌ CSS file too small"
              exit 1
            fi
          else
            echo "❌ style.css not found"
            exit 1
          fi
          
          echo "✅ All frontend files validated"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          cd backend && npm ci
      
      - name: Process APIs
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🚀 Processing APIs..."
          python pipeline/batch_processor.py data --clear
          
          if [ -f "registry/global_index.json" ]; then
            api_count=$(python -c "import json; data=json.load(open('registry/global_index.json')); print(data['metadata']['totalAPIs'])")
            echo "✅ Processed $api_count APIs"
          else
            echo "❌ Processing failed"
            exit 1
          fi
      
      - name: Start backend
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🚀 Starting backend..."
          node simple-server.js > integration.log 2>&1 &
          echo $! > integration.pid
          
          # Wait for server
          for i in {1..30}; do
            if curl -sf http://localhost:3002/apis > /dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi
            sleep 1
          done
          
          echo "❌ Server timeout"
          cat integration.log
          exit 1
      
      - name: Run integration tests
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          echo "🔍 Running integration tests..."
          
          # Test API listing
          echo "Test 1: API listing"
          apis_response=$(curl -s http://localhost:3002/apis)
          echo "Response received:"
          echo "$apis_response"
          
          if echo "$apis_response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "✅ API listing works"
          else
            echo "❌ API listing failed"
            exit 1
          fi
          
          # Test AI search with multiple queries
          queries=("get users" "create pet" "weather forecast")
          
          for query in "${queries[@]}"; do
            echo "Testing: $query"
            response=$(curl -s -X POST http://localhost:3002/agent/tools/search \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$query\"}")
            
            echo "Response received:"
            echo "$response"
            
            if echo "$response" | grep -q '"success"[[:space:]]*:[[:space:]]*true'; then
              echo "✅ Query '$query' OK"
            else
              echo "❌ Query '$query' failed"
              echo "Response: $response"
              exit 1
            fi
          done
          
          echo "✅ All integration tests passed"
      
      - name: Cleanup
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          if [ -f integration.pid ]; then
            kill $(cat integration.pid) 2>/dev/null || true
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: ${{ env.PROJECT_DIR }}/backend/integration.log
          retention-days: 7

