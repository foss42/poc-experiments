openapi: 3.0.0
info:
  title: Multi-Auth API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    OAuth2Auth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/oauth/authorize
          tokenUrl: https://example.com/oauth/token
security:
  - BearerAuth: []
paths:
  /public:
    get:
      summary: Public endpoint
      security: []  # No auth required
      responses:
        '200':
          description: Public data
  /users:
    get:
      summary: Get users (uses global auth)
      responses:
        '200':
          description: List of users
  /admin:
    post:
      summary: Admin endpoint
      security:
        - ApiKeyAuth: []  # Specific auth required
      responses:
        '201':
          description: Admin action completed