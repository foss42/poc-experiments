openapi: 3.0.0
info:
  title: Endpoint Auth Test API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []  # Global auth is bearer
paths:
  /users:
    get:
      summary: Get users (inherits global bearer auth)
      responses:
        '200':
          description: List of users
  /public:
    get:
      summary: Public endpoint (no auth required)
      security: []  # Empty array = public
      responses:
        '200':
          description: Public data
  /admin:
    post:
      summary: Admin endpoint (specific API key auth)
      security:
        - ApiKeyAuth: []  # Specific auth override
      responses:
        '201':
          description: Admin action
  /health:
    get:
      summary: Health check (no security defined, inherits global)
      responses:
        '200':
          description: Health status