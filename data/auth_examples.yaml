openapi: 3.0.0
info:
  title: Auth Examples API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/oauth/authorize
          tokenUrl: https://example.com/oauth/token
          scopes:
            read: Read access
            write: Write access
security:
  - ApiKeyAuth: []
paths:
  /users:
    get:
      summary: Get users
      responses:
        '200':
          description: List of users
  /protected:
    get:
      summary: Protected endpoint
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Protected data